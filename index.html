<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Mi Rutina</title>
<meta name="description" content="App para seguir tu rutina de entrenamiento" />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1d9e75" />

<!-- iOS PWA support -->
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mi Rutina" />

<style>
  :root {
    --bg: #0f1115;
    --surface: #171a21;
    --surface-2: #1e222b;
    --border: #2a2e38;
    --text: #f2f2f0;
    --text-secondary: #9a9ea8;
    --text-tertiary: #6b6f78;
    --accent: #1d9e75;
    --accent-light: #1f3a32;
    --accent-text: #5dcaa5;
    --day1: #d85a30;
    --day1-bg: #3a2418;
    --day1-text: #f0997b;
    --day2: #378add;
    --day2-bg: #1a2c3e;
    --day2-text: #85b7eb;
    --danger: #e24b4a;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
    min-height: 100vh;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 1rem 1rem 0;
  }

  header.topbar {
    padding-top: calc(0.75rem + env(safe-area-inset-top));
    padding-bottom: 0.5rem;
  }

  header.topbar h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }

  .day-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .day-tab {
    flex: 1;
    padding: 10px 8px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
  }

  .day-tab.active {
    border-color: var(--day1);
    background: var(--day1-bg);
    color: var(--day1-text);
  }

  .day-tab.active[data-day="dia2"] {
    border-color: var(--day2);
    background: var(--day2-bg);
    color: var(--day2-text);
  }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
    margin-bottom: 12px;
  }

  .exercise-card .ex-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    gap: 8px;
  }

  .exercise-card .ex-name {
    font-weight: 500;
    font-size: 15px;
    margin: 0;
  }

  .exercise-card .ex-target {
    font-size: 12px;
    color: var(--text-tertiary);
    white-space: nowrap;
  }

  .set-row {
    display: grid;
    grid-template-columns: 26px 1fr 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }

  .set-row .set-num {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
  }

  .set-row input {
    width: 100%;
    height: 38px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 15px;
    padding: 0 10px;
  }

  .set-row input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .col-labels {
    display: grid;
    grid-template-columns: 26px 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }

  .col-labels span {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .add-set-btn {
    margin-top: 4px;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .finish-btn {
    width: 100%;
    font-weight: 600;
    font-size: 15px;
    padding: 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent-text);
    cursor: pointer;
    margin: 4px 0 1.5rem;
  }

  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
    margin-bottom: 12px;
  }

  .history-entry .h-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    font-weight: 500;
  }

  .badge.dia1 { background: var(--day1-bg); color: var(--day1-text); }
  .badge.dia2 { background: var(--day2-bg); color: var(--day2-text); }

  .h-date {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .h-exercise {
    font-size: 13px;
    margin-bottom: 4px;
    line-height: 1.5;
  }

  .h-exercise .ex-sets {
    color: var(--text-secondary);
  }

  .empty-state {
    color: var(--text-secondary);
    font-size: 14px;
    text-align: center;
    padding: 3rem 1rem;
  }

  .delete-entry {
    background: transparent;
    border: none;
    color: var(--text-tertiary);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    line-height: 1;
  }

  nav.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 10;
  }

  nav.bottom-nav button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-tertiary);
    font-size: 11px;
    padding: 10px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  nav.bottom-nav button.active {
    color: var(--accent-text);
  }

  nav.bottom-nav svg {
    width: 22px;
    height: 22px;
  }

  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<div id="app">
  <header class="topbar">
    <h1>Mi rutina</h1>
  </header>

  <div id="view-workout" class="view active"></div>
  <div id="view-history" class="view"></div>
</div>

<nav class="bottom-nav">
  <button id="nav-workout" class="active" data-view="workout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11M21 3l-3.5 3.5M3 21l3.5-3.5M15.5 4.5l4 4M4.5 15.5l4 4M9 5l1.5-1.5a1.5 1.5 0 0 1 2 0l8 8a1.5 1.5 0 0 1 0 2L19 15M5 9l1.5-1.5M9 19l1.5 1.5a1.5 1.5 0 0 0 2 0l8-8a1.5 1.5 0 0 0 0-2L19 9"/></svg>
    Entrenar
  </button>
  <button id="nav-history" data-view="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
    Historial
  </button>
</nav>

<script src="app.js"></script>
</body>
</html>
